[profile.default]
src            = "src"
out            = "out"
libs           = ["lib"]
test           = "test"
script         = "script"
solc           = "0.8.20"
optimizer      = true
optimizer_runs = 200
remappings     = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
    "ds-test/=lib/forge-std/lib/ds-test/src/"
]

# Report gas for every public function in these contracts
gas_reports = ["DynamicFeePool", "PoolFactory", "LPToken"]

[profile.default.fuzz]
runs = 1000

# Stricter fuzz runs in CI
[profile.ci]
fuzz = { runs = 10_000 }

[fmt]
line_length    = 120
tab_width      = 4
bracket_spacing = true
